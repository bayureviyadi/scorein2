<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        if (localStorage.getItem('isAuth') !== 'true') {
            window.location.href = '../auth/login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security & Role Control - TMS Silat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen transition-colors duration-300">

    <div class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="flex justify-between items-center mb-10">
            <div>
                <a href="master.html" class="text-blue-600 hover:underline text-sm mb-2 inline-block">
                    <i class="fas fa-arrow-left"></i> Kembali ke Master Control
                </a>
                <h1 class="text-3xl font-black italic uppercase">Security <span class="text-blue-600">Access</span></h1>
                <p class="text-slate-500 text-sm">Monitor login aktif dan kelola kredensial akun.</p>
            </div>
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-3 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block text-amber-400"></i>
            </button>
        </header>

        <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-xl mb-10">
            <h3 class="font-bold mb-6 flex items-center gap-2 text-lg">
                <i class="fas fa-key text-blue-500"></i> Update Kredensial
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-slate-500 ml-1">Pilih Role</label>
                    <select id="role-select" class="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                        <option value="super_admin">Super Admin</option>
                        <option value="admin">Admin</option>
                        <option value="operator">Operator</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-slate-500 ml-1">Username</label>
                    <input type="text" id="role-username" placeholder="Username baru" class="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="space-y-2 md:col-span-2">
                    <label class="text-xs font-bold uppercase text-slate-500 ml-1">Password</label>
                    <div class="relative">
                        <input type="password" id="role-password" placeholder="Password baru" class="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500">
                            <i id="eye-icon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
            <button onclick="saveRole()" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30">
                SIMPAN & UPDATE AKUN
            </button>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/30">
                <h3 class="font-bold">Live Monitoring & Session</h3>
                <span class="flex items-center gap-2 text-[10px] font-bold text-emerald-500 uppercase">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    Sistem Terkoneksi
                </span>
            </div>
            <div id="role-list" class="divide-y divide-slate-100 dark:divide-slate-800">
                <div class="p-10 text-center text-slate-400 italic">Memantau aktivitas login...</div>
            </div>
        </div>
    </div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="../assets/js/auth-check.js"></script>
    <script>
        // --- INISIALISASI DATABASE ---
        const db = firebase.database();

        function saveRole() {
            const role = document.getElementById('role-select').value;
            const user = document.getElementById('role-username').value;
            const pass = document.getElementById('role-password').value;
            if(!user || !pass) return alert("Isi semua data!");

            db.ref('users/' + role).update({
                username: user,
                password: pass,
                lastUpdated: new Date().toLocaleString()
            }).then(() => {
                alert("Berhasil diperbarui!");
                document.getElementById('role-username').value = "";
                document.getElementById('role-password').value = "";
            });
        }

        // FUNGSI FORCE LOGOUT
        function forceLogout(role) {
            if(confirm(`Keluarkan paksa user ${role.replace('_',' ')}?`)) {
                db.ref('users/' + role).update({
                    isLoggedIn: false,
                    lastForceLogout: new Date().toLocaleString()
                });
            }
        }

        db.ref('users').on('value', snap => {
            const list = document.getElementById('role-list');
            list.innerHTML = "";
            const data = snap.val();
            const order = ['super_admin', 'admin', 'operator'];
            
            order.forEach(roleKey => {
                const item = data ? data[roleKey] : null;
                if(item) {
                    const statusColor = item.isLoggedIn ? 'text-emerald-500' : 'text-slate-300';
                    const ipDisplay = item.lastIP || 'Belum ada login';
                    
                    list.innerHTML += `
                        <div class="p-6 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                            <div class="flex gap-4 items-start">
                                <div class="mt-1 ${statusColor}"><i class="fas fa-circle text-[10px]"></i></div>
                                <div>
                                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${roleKey.replace('_', ' ')}</p>
                                    <h4 class="font-bold text-lg leading-tight">${item.username}</h4>
                                    <p class="text-xs text-slate-400 mt-1"><i class="fas fa-network-wired mr-1"></i> IP: <span class="font-mono text-slate-600 dark:text-slate-300">${ipDisplay}</span></p>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <button onclick="editThis('${roleKey}', '${item.username}')" class="p-3 text-slate-400 hover:text-blue-500 transition" title="Edit Akun">
                                    <i class="fas fa-edit"></i>
                                </button>
                                ${item.isLoggedIn ? `
                                    <button onclick="forceLogout('${roleKey}')" class="bg-red-50 dark:bg-red-900/20 text-red-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition flex items-center gap-2">
                                        <i class="fas fa-sign-out-alt"></i> FORCE LOGOUT
                                    </button>
                                ` : `
                                    <span class="text-[10px] font-bold text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-2 rounded-xl">OFFLINE</span>
                                `}
                            </div>
                        </div>
                    `;
                }
            });
        });

        function editThis(role, user) {
            document.getElementById('role-select').value = role;
            document.getElementById('role-username').value = user;
            document.getElementById('role-password').focus();
        }

        function togglePass() {
            const input = document.getElementById('role-password');
            const icon = document.getElementById('eye-icon');
            input.type = input.type === "password" ? "text" : "password";
            icon.className = input.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
        }
        
        //Logout paksa
        const currentRole = localStorage.getItem('userRole');
        db.ref('users/' + currentRole + '/isLoggedIn').on('value', snap => {
            if (snap.val() === false) {
                alert("Sesi Anda telah dihentikan oleh Admin!");
                window.location.href = "../auth/login.html";
            }
        });
    </script>
</body>
</html>
