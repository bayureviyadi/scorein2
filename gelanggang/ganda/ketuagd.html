<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        if (localStorage.getItem('isAuth') !== 'true') {
            window.location.href = '../../auth/login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketua Pertandingan — Ganda - TMS Silat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <nav class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500 p-2 rounded-lg text-white">
                    <i class="fas fa-user-tie text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black tracking-tighter uppercase italic leading-none">Ketua Pertandingan — Ganda</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Seni Ganda Monitoring</p>
                </div>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-slate-900 px-3 py-1 rounded-full border border-slate-700">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-300">LIVE CONNECTION</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-2xl overflow-hidden relative">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <i class="fas fa-user-ninja text-8xl"></i>
            </div>
            <div class="relative z-10">
                <p class="text-emerald-400 text-xs font-black uppercase tracking-[0.3em] mb-2">Sedang Bertanding</p>
                <h2 id="atlet-nama" class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter">Memuat Nama...</h2>
                <p id="atlet-kontingen" class="text-slate-400 text-lg font-bold uppercase tracking-widest">Memuat Kontingen...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-4">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest px-2">Monitoring Nilai Juri</h3>
                <div id="juri-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div class="space-y-6">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest px-2">Status & Ringkasan</h3>

                <!-- Pool Progress Card (hidden in versus mode) -->
                <div id="pool-queue-section" class="hidden bg-indigo-600 rounded-3xl p-5 text-white border border-indigo-700 shadow-xl">
                    <p class="text-indigo-200 text-[10px] font-black uppercase mb-1">Mode Pool</p>
                    <div id="pool-progress-ketua" class="text-3xl font-black italic tracking-tighter">Atlet ? dari ?</div>
                </div>

                <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-xl space-y-6">
                    <div class="text-center">
                        <p class="text-slate-400 text-[10px] font-black uppercase mb-1">Rata-rata Skor Sementara</p>
                        <div id="avg-score" class="text-6xl font-black italic text-white tracking-tighter">0.00</div>
                    </div>
                    
                    <div class="space-y-3">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-400 italic">Total Juri Aktif</span>
                            <span id="stat-juri-count" class="font-bold">0/0</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-400 italic">Nilai Masuk</span>
                            <span id="stat-nilai-masuk" class="font-bold text-emerald-400">0</span>
                        </div>
                    </div>

                    <button onclick="window.print()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-black py-4 rounded-2xl transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-print"></i> CETAK REKAPITULASI
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCaY8iCrMLVHXukVTih5ZPLzLj-2JoQKv0",
            databaseURL: "https://tms-silat-sera-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tms-silat-sera"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentJuryConfig = 3;
        let currentMatchMode = 'versus';

        // 1. Pantau Konfigurasi (Berapa jumlah juri + mode)
        db.ref('ganda_match/config').on('value', snap => {
            const config = snap.val();
            if(config) {
                currentJuryConfig = config.juryCount || 3;
                currentMatchMode = config.matchMode || 'versus';
                initJuriCards();

                // Show pool queue section if in pool mode
                const poolSection = document.getElementById('pool-queue-section');
                if(poolSection) poolSection.classList.toggle('hidden', currentMatchMode !== 'pool');
            }
        });

        // 2. Pantau Pool Config
        db.ref('ganda_match/pool_config').on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const el = document.getElementById('pool-progress-ketua');
            if(el) {
                const idx = (data.currentIndex || 0) + 1;
                el.innerText = `Atlet ${idx} dari ${data.totalAthletes || '?'}`;
            }
        });

        // 2. Pantau Atlet Aktif
        db.ref('ganda_match/active_athlete').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('atlet-nama').innerText = data.nama || "---";
                document.getElementById('atlet-kontingen').innerText = data.kontingen || "---";
            }
        });

        function initJuriCards() {
            const container = document.getElementById('juri-container');
            container.innerHTML = "";
            for(let i=1; i<=currentJuryConfig; i++) {
                container.innerHTML += `
                    <div id="card-juri-${i}" class="bg-slate-800 border border-slate-700 rounded-2xl p-4 flex items-center justify-between transition-all">
                        <div class="flex items-center gap-3">
                            <div id="ready-juri-${i}" class="w-3 h-3 bg-slate-600 rounded-full"></div>
                            <div>
                                <h4 class="text-[10px] font-black text-slate-500 uppercase leading-none">Juri ${i}</h4>
                                <p id="status-juri-${i}" class="text-[9px] font-bold text-slate-400 mt-1 uppercase italic">Offline</p>
                                <div class="flex gap-2 mt-1.5">
                                    <span class="text-[8px] font-bold text-slate-500 uppercase">T: <span id="tehnik-juri-${i}" class="text-slate-300">–</span></span>
                                    <span class="text-[8px] font-bold text-slate-500 uppercase">K: <span id="ketegasan-juri-${i}" class="text-slate-300">–</span></span>
                                    <span class="text-[8px] font-bold text-slate-500 uppercase">P: <span id="penjiwaan-juri-${i}" class="text-slate-300">–</span></span>
                                </div>
                            </div>
                        </div>
                        <div id="score-juri-${i}" class="text-3xl font-black italic text-slate-600 tracking-tighter">0.00</div>
                    </div>
                `;
                observeJuri(i);
            }
            document.getElementById('stat-juri-count').innerText = `0/${currentJuryConfig}`;
        }

        function observeJuri(id) {
            // Pantau Status Ready Juri
            db.ref(`ganda_match/status_juri/juri_ganda_${id}`).on('value', snap => {
                const data = snap.val();
                const indicator = document.getElementById(`ready-juri-${id}`);
                const statusTxt = document.getElementById(`status-juri-${id}`);
                const card = document.getElementById(`card-juri-${id}`);

                if(data && data.ready) {
                    indicator.className = "w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.6)]";
                    statusTxt.innerText = "Ready";
                    statusTxt.className = "text-[9px] font-bold text-emerald-400 mt-1 uppercase italic";
                } else {
                    indicator.className = "w-3 h-3 bg-slate-600 rounded-full";
                    statusTxt.innerText = "Not Ready";
                    statusTxt.className = "text-[9px] font-bold text-slate-400 mt-1 uppercase italic";
                }
            });

            // Pantau Nilai Masuk
            db.ref(`live_scores/ganda/juri_ganda_${id}`).on('value', snap => {
                const data = snap.val();
                const scoreDisplay = document.getElementById(`score-juri-${id}`);
                const tehnikEl = document.getElementById(`tehnik-juri-${id}`);
                const ketegasanEl = document.getElementById(`ketegasan-juri-${id}`);
                const penjiwaanEl = document.getElementById(`penjiwaan-juri-${id}`);
                if(data && data.total) {
                    scoreDisplay.innerText = data.total.toFixed(2);
                    scoreDisplay.className = "text-3xl font-black italic text-white tracking-tighter";
                    if(tehnikEl) tehnikEl.innerText = data.tehnik ? parseFloat(data.tehnik).toFixed(2) : '–';
                    if(ketegasanEl) ketegasanEl.innerText = data.ketegasan ? parseFloat(data.ketegasan).toFixed(2) : '–';
                    if(penjiwaanEl) penjiwaanEl.innerText = data.penjiwaan ? parseFloat(data.penjiwaan).toFixed(2) : '–';
                    calculateSummary();
                } else {
                    scoreDisplay.innerText = "0.00";
                    scoreDisplay.className = "text-3xl font-black italic text-slate-600 tracking-tighter";
                    if(tehnikEl) tehnikEl.innerText = '–';
                    if(ketegasanEl) ketegasanEl.innerText = '–';
                    if(penjiwaanEl) penjiwaanEl.innerText = '–';
                }
            });
        }

        function calculateSummary() {
            let totalScore = 0;
            let count = 0;
            for(let i=1; i<=currentJuryConfig; i++) {
                const score = parseFloat(document.getElementById(`score-juri-${i}`).innerText);
                if(score > 0) {
                    totalScore += score;
                    count++;
                }
            }
            
            const avg = count > 0 ? (totalScore / count).toFixed(2) : "0.00";
            document.getElementById('avg-score').innerText = avg;
            document.getElementById('stat-nilai-masuk').innerText = count;
            document.getElementById('stat-juri-count').innerText = `${count}/${currentJuryConfig}`;
        }

// 1. Matikan Klik Kanan
document.addEventListener('contextmenu', event => event.preventDefault());

// 2. Matikan Pintasan Keyboard (F12, Ctrl+Shift+I, Ctrl+U, Ctrl+Shift+J)
document.addEventListener('keydown', e => {
    if (
        e.keyCode === 123 || // F12
        (e.ctrlKey && e.shiftKey && e.keyCode === 73) || // Ctrl+Shift+I
        (e.ctrlKey && e.shiftKey && e.keyCode === 74) || // Ctrl+Shift+J
        (e.ctrlKey && e.keyCode === 85) // Ctrl+U
    ) {
        e.preventDefault();
        return false;
    }
});
    </script>
</body>
</html>
