<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        if (localStorage.getItem('isAuth') !== 'true') {
            window.location.href = '../../auth/login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dewan Match Control</title>
    <link rel="stylesheet" href="../../assets/css/gelanggang/tanding/dewan.css">
    <link rel="stylesheet" href="../../assets/css/gelanggang/tanding/dewan-var.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body data-theme="standard">

<div class="top-info">
    <div class="athlete-info">
        <span class="athlete-team" id="teamBiru">SUDUT BIRU</span>
        <span class="athlete-name" id="nameBiru">PESILAT BIRU</span>
    </div>
    <div class="timer-container">
        <div class="match-meta">
            <div class="partai-badge" id="partaiDisp">PARTAI -</div>
            <div class="class-info"><span id="kategoriDisp">KATEGORI</span> • <span id="kelasDisp">KELAS</span></div>
        </div>
        <div class="timer-main" id="timerDisp">02:00</div>
    </div>
    <div class="athlete-info" style="text-align: right;">
        <span class="athlete-team" id="teamMerah">SUDUT MERAH</span>
        <span class="athlete-name" id="nameMerah">PESILAT MERAH</span>
    </div>
</div>

<div class="match-layout">
    <div class="side-control">
        <button class="btn-action btn-j span-full" onclick="inputDewan('Biru','Jatuhan',3)">JATUHAN +3</button>
        <button id="btn-Biru-BN1" class="btn-action span-half" onclick="inputDewan('Biru','BN1',0)">BN 1</button>
        <button id="btn-Biru-BN2" class="btn-action span-half" onclick="inputDewan('Biru','BN2',0)">BN 2</button>
        <button class="btn-action span-half btn-tegur" onclick="inputDewan('Biru','T1',-1)">T 1</button>
        <button class="btn-action span-half btn-tegur" onclick="inputDewan('Biru','T2',-2)">T 2</button>
        <button class="btn-action btn-p span-third" onclick="inputDewan('Biru','P1',-5)">P1</button>
        <button class="btn-action btn-p span-third" onclick="inputDewan('Biru','P2',-10)">P2</button>
        <button class="btn-action btn-p3 span-third" onclick="inputDewan('Biru','P3',-15)">P3</button>
        <button class="btn-action btn-undo span-full" onclick="hapusTerakhir('Biru')">UNDO BLUE</button>
    </div>

    <div class="score-box blue-score"><div class="score-val" id="scoreBiru">0</div></div>

    <div class="round-container">
        <div class="round-bar" id="rb3">III</div>
        <div class="round-bar" id="rb2">II</div>
        <div class="round-bar active" id="rb1">I</div>
        <button class="btn-mode-cycle" onclick="cycleTheme()">MODE</button>
    </div>

    <div class="score-box red-score"><div class="score-val" id="scoreMerah">0</div></div>

    <div class="side-control">
        <button class="btn-action btn-j span-full" onclick="inputDewan('Merah','Jatuhan',3)">JATUHAN +3</button>
        <button id="btn-Merah-BN1" class="btn-action span-half" onclick="inputDewan('Merah','BN1',0)">BN 1</button>
        <button id="btn-Merah-BN2" class="btn-action span-half" onclick="inputDewan('Merah','BN2',0)">BN 2</button>
        <button class="btn-action span-half btn-tegur" onclick="inputDewan('Merah','T1',-1)">T 1</button>
        <button class="btn-action span-half btn-tegur" onclick="inputDewan('Merah','T2',-2)">T 2</button>
        <button class="btn-action btn-p span-third" onclick="inputDewan('Merah','P1',-5)">P1</button>
        <button class="btn-action btn-p span-third" onclick="inputDewan('Merah','P2',-10)">P2</button>
        <button class="btn-action btn-p3 span-third" onclick="inputDewan('Merah','P3',-15)">P3</button>
        <button class="btn-action btn-undo span-full" onclick="hapusTerakhir('Merah')">UNDO RED</button>
    </div>
</div>

<!-- ── VAR TRIGGER BAR ── -->
<div class="var-trigger-bar">
    <button class="btn-var btn-var-pelanggaran" onclick="bukaVAR('Pelanggaran')">
        <iconify-icon inline icon="mdi:alert-outline" style="vertical-align: -0.125em; font-size: 1.2em;"></iconify-icon> VAR PELANGGARAN
    </button>
    <button class="btn-var btn-var-jatuhan" onclick="bukaVAR('Jatuhan')">
        <iconify-icon inline icon="mdi:boxing-glove" style="vertical-align: -0.125em; font-size: 1.2em;"></iconify-icon> VAR JATUHAN
    </button>
</div>

<div class="bottom-container">
    <div class="juri-status-bar">
        <div class="juri-grid" id="gridBiru"></div>
        <div class="juri-grid" id="gridMerah"></div>
    </div>
    <table class="footer-stats">
        <thead>
            <tr>
                <th>SUDUT</th><th>BN1</th><th>BN2</th><th>T1</th><th>T2</th><th>P1</th><th>P2</th><th>P3</th><th>JTN</th><th>TDN</th><th>PKL</th>
            </tr>
        </thead>
        <tbody>
            <tr id="row-Biru"><td>BIRU</td><td id="stat-Biru-BN1">0</td><td id="stat-Biru-BN2">0</td><td id="stat-Biru-T1">0</td><td id="stat-Biru-T2">0</td><td id="stat-Biru-P1">0</td><td id="stat-Biru-P2">0</td><td id="stat-Biru-P3">0</td><td id="stat-Biru-Jatuhan">0</td><td id="stat-Biru-tendang">0</td><td id="stat-Biru-pukul">0</td></tr>
            <tr id="row-Merah"><td>MERAH</td><td id="stat-Merah-BN1">0</td><td id="stat-Merah-BN2">0</td><td id="stat-Merah-T1">0</td><td id="stat-Merah-T2">0</td><td id="stat-Merah-P1">0</td><td id="stat-Merah-P2">0</td><td id="stat-Merah-P3">0</td><td id="stat-Merah-Jatuhan">0</td><td id="stat-Merah-tendang">0</td><td id="stat-Merah-pukul">0</td></tr>
        </tbody>
    </table>
</div>

<!-- ── VAR MODAL ── -->
<div id="varModal" class="var-modal-overlay">
    <div class="var-modal-box" id="varModalBox">

        <div class="var-modal-header">
            <span class="var-header-badge"><iconify-icon inline icon="mdi:lightning-bolt" style="vertical-align: -0.125em;"></iconify-icon> VAR</span>
            <span class="var-header-title">VERIFIKASI AKTIF</span>
        </div>

        <div class="var-modal-type" id="varTypeLabel">—</div>
        <div class="var-waiting-text" id="varWaitingText">MENUNGGU VOTE JURI...</div>

        <!-- 3 kotak vote juri -->
        <div class="var-juri-votes">
            <div class="var-vote-box" id="voteBox1">
                <div class="var-vote-label">JURI 1</div>
                <div class="var-vote-result" id="voteResult1">—</div>
            </div>
            <div class="var-vote-box" id="voteBox2">
                <div class="var-vote-label">JURI 2</div>
                <div class="var-vote-result" id="voteResult2">—</div>
            </div>
            <div class="var-vote-box" id="voteBox3">
                <div class="var-vote-label">JURI 3</div>
                <div class="var-vote-result" id="voteResult3">—</div>
            </div>
        </div>

        <!-- Tally -->
        <div class="var-tally-bar">
            <div class="var-tally-chip var-tally-biru" id="tallyBiru">BIRU: 0</div>
            <div class="var-tally-chip var-tally-merah" id="tallyMerah">MERAH: 0</div>
            <div class="var-tally-chip var-tally-invalid" id="tallyInvalid">INV: 0</div>
        </div>

        <!-- Hasil mayoritas -->
        <div class="var-majority" id="varMajority">Menunggu hasil voting...</div>

        <!-- Aksi -->
        <div class="var-actions">
            <button class="btn-action btn-var-cancel" onclick="batalVAR()"><iconify-icon inline icon="mdi:close-circle-outline" style="vertical-align: -0.125em; font-size: 1.2em;"></iconify-icon> BATAL</button>
            <button class="btn-action btn-var-confirm" id="btnVarConfirm" onclick="konfirmasiVAR()">
                <iconify-icon inline icon="mdi:check-circle-outline" style="vertical-align: -0.125em; font-size: 1.2em;"></iconify-icon> KONFIRMASI & SELESAI
            </button>
        </div>

    </div>
</div>

<!-- ── CUSTOM CONFIRM MODAL ── -->
<div id="customConfirmModal" class="var-modal-overlay" style="z-index: 10000; display: none;">
    <div class="var-modal-box" style="text-align: center; max-width: 400px; padding: 20px; display: flex; flex-direction: column; justify-content: center;">
        <div class="var-modal-header" style="justify-content: center; margin-bottom: 15px;">
            <span class="var-header-badge"><iconify-icon inline icon="mdi:help-circle-outline" style="vertical-align: -0.125em;"></iconify-icon> KONFIRMASI</span>
        </div>
        <div style="color: white; font-size: 1.2rem; margin-bottom: 10px; font-weight: bold;" id="confirmModalTitle">KONFIRMASI</div>
        <div style="color: #ccc; margin-bottom: 25px; white-space: pre-line; line-height: 1.5;" id="confirmModalText"></div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-action btn-var-cancel" style="flex: 1;" onclick="closeCustomConfirm(false)"><iconify-icon inline icon="mdi:close-circle-outline" style="vertical-align: -0.125em; font-size: 1.2em;"></iconify-icon> BATAL</button>
            <button class="btn-action btn-var-confirm ready" style="flex: 1;" onclick="closeCustomConfirm(true)"><iconify-icon inline icon="mdi:check-circle-outline" style="vertical-align: -0.125em; font-size: 1.2em;"></iconify-icon> YA, LANJUTKAN</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="../../assets/js/auth-check.js"></script>
<script src="../../assets/js/gelanggang/tanding/script-dewantd.js"></script>
</body>
</html>
